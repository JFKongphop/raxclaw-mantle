app = "raxclaw-mantle"
primary_region = "ams"

[build]
  dockerfile = 'Dockerfile'

[http_service]
auto_start_machines = true
auto_stop_machines = "off"
force_https = true
internal_port = 3_001
min_machines_running = 0
processes = ["app"]

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "1gb"
memory_mb = 512

[http_service.checks]
[http_service.checks.http]
method = "GET"
path = "/health"
grace_period = "10s"
interval = "15s"
timeout = "5s"
